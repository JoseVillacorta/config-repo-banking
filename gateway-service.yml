server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      enabled: true 
      discovery:
        locator:
          enabled: false
          lower-case-service-id: true
      routes:
        - id: ms-customer
          uri: lb://ms-customer
          predicates:
            - Path=/ms-customer/**
          filters:
            - StripPrefix=1 # Elimina el prefijo /ms-customer antes de enviar la peticion al ms

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    gateway:
      enabled: true
      
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    
          
